name: Generate Anki Deck

on:
  push:
    paths:
      - 'src/pages/posts/analytics/*.md' # Trigger when markdown files in this directory are updated
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Use the version your script requires

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install genanki pyyaml

    # Step 4: Run the script
    - name: Generate Anki Deck
      run: |
        python generate_anki.py
      env:
        OUTPUT_PATH: output # Ensure environment variables are available if needed

    # Step 5: Upload output deck as artifact
    - name: Upload Anki Deck
      uses: actions/upload-artifact@v3
      with:
        name: analytics-anki-deck
        path: output/analytics.apkg # Specify the output file
